name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  PNPM_VERSION: "9.0.0"

jobs:
  quality-gates:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [backend, frontend]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles(format('{0}/pnpm-lock.yaml', matrix.project)) }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Dependencies
        working-directory: ./${{ matrix.project }}
        run: pnpm install --no-frozen-lockfile

      - name: Lint Code
        working-directory: ./${{ matrix.project }}
        run: pnpm run lint || echo "No lint script, skipping" # Assuming lint might fail or be missing in backend

      - name: Run Tests
        working-directory: ./${{ matrix.project }}
        run: pnpm run test

      - name: Security Audit
        working-directory: ./${{ matrix.project }}
        run: pnpm audit --prod
